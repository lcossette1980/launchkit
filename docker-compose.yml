services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gtm_analysis}
      POSTGRES_USER: ${POSTGRES_USER:-gtm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gtm_user} -d ${POSTGRES_DB:-gtm_analysis}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  web:
    build: .
    ports:
      - "${WEB_PORT:-8001}:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-gtm_user}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-gtm_analysis}
      - REDIS_URL=redis://redis:6379
      - AWS_ENDPOINT_URL=http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             gunicorn gtm.api.app:create_app() --config gunicorn.conf.py"
    restart: unless-stopped

  celery_worker:
    build: .
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-gtm_user}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-gtm_analysis}
      - REDIS_URL=redis://redis:6379
      - AWS_ENDPOINT_URL=http://minio:9000
    command: celery -A gtm.tasks.celery_app:celery_app worker --loglevel=info --concurrency=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
